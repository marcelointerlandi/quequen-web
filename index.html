<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partido Justicialista de Necochea, Unidad Básica Quequén</title>
    <meta name="description" content="La UB de Quequén del Partido Justicialista de Necochea, comprometida con el bienestar de nuestra comunidad.">
    <meta property="og:type"        content="website">
    <meta property="og:title"       content="Partido Justicialista de Necochea, Unidad Básica Quequén">
    <meta property="og:description" content="La UB de Quequén del Partido Justicialista de Necochea, comprometida con el bienestar de nuestra comunidad.">
    <meta property="og:url"         content="https://pjquequenense.com.ar">
    <meta property="og:image"       content="">
    <meta name="twitter:card"       content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="css/styles.css">

    <style>
    /* =============================================
       DESIGN TOKENS
    ============================================= */
    :root {
        --azul:        #003366;
        --azul-med:    #004d99;
        --celeste:     #75aadb;
        --celeste-lt:  #d6e8f7;
        --blanco:      #ffffff;
        --gris-bg:     #f4f6f9;
        --gris-borde:  #dde3ea;
        --texto:       #1a2332;
        --texto-suave: #5a6a7e;
        --rojo:        #dc3545;
        --verde:       #28a745;
        --font-display: 'Playfair Display', Georgia, serif;
        --font-body:    'Source Sans 3', 'Segoe UI', sans-serif;
        --sombra-sm:   0 2px 8px rgba(0,51,102,.08);
        --sombra-md:   0 6px 24px rgba(0,51,102,.12);
        --sombra-lg:   0 16px 48px rgba(0,51,102,.18);
        --radio:       10px;
        --trans:       0.22s ease;
    }

    body { font-family: var(--font-body); color: var(--texto); background: var(--gris-bg); }

    /* =============================================
       NAVBAR
    ============================================= */
    .navbar {
        background: var(--azul);
        padding: .9rem 2rem;
        position: fixed; width: 100%; top: 0; z-index: 1000;
        display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 2px 12px rgba(0,0,0,.25);
        border-bottom: 2px solid var(--celeste);
    }
    .logo {
        color: var(--blanco);
        font-family: var(--font-display);
        font-size: 1.35rem; font-weight: 700;
    }
    .nav-links { display: flex; gap: .5rem; }
    .nav-links a {
        color: rgba(255,255,255,.85);
        font-size: .9rem; font-weight: 500;
        padding: .45rem .9rem; border-radius: 6px;
        text-decoration: none;
        transition: background var(--trans), color var(--trans);
    }
    .nav-links a:hover { background: rgba(117,170,219,.25); color: #fff; }

    /* =============================================
       HERO
    ============================================= */
    .hero {
        min-height: 72vh;
        background: linear-gradient(135deg, #00234d 0%, #003366 45%, #005599 100%);
        display: flex; align-items: center; justify-content: center;
        text-align: center; color: white; margin-top: 60px;
        position: relative; overflow: hidden;
    }
    .hero::before {
        content:''; position:absolute; inset:0;
        background: radial-gradient(ellipse at 70% 50%, rgba(117,170,219,.18) 0%, transparent 60%);
    }
    .hero-content { position:relative; z-index:1; padding:2rem; }
    .hero-content h1 {
        font-family: var(--font-display);
        font-size: clamp(1.8rem,5vw,3.2rem);
        line-height: 1.15; margin-bottom: .6rem;
        text-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .hero-content h2 {
        font-family: var(--font-display);
        font-size: clamp(1.1rem,3vw,1.8rem); font-weight: 700;
        color: var(--celeste); margin-bottom: 1.5rem;
    }
    .hero-content button {
        padding: .85rem 2.2rem; font-family: var(--font-body);
        font-size: 1rem; font-weight: 600;
        background: white; color: var(--azul);
        border: none; border-radius: 50px; cursor: pointer;
        transition: transform var(--trans), box-shadow var(--trans);
    }
    .hero-content button:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,.25); }

    .hero-escudo {
        width: 90px;
        height: 90px;
        object-fit: contain;
        margin-bottom: 1.2rem;
        filter: drop-shadow(0 4px 16px rgba(0,0,0,.4));
        animation: fadeInUp 0.8s ease both;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* =============================================
       SECTION HELPERS
    ============================================= */
    .section-title {
        font-family: var(--font-display);
        font-size: clamp(1.6rem,4vw,2.4rem);
        color: var(--azul); text-align: center; margin-bottom: .5rem;
    }
    .section-divider {
        width: 50px; height: 3px; background: var(--celeste);
        margin: .7rem auto 2rem; border-radius: 2px;
    }

    /* =============================================
       INFO CARDS
    ============================================= */
    .info-card {
        background: var(--blanco); border-radius: var(--radio);
        padding: 2rem; box-shadow: var(--sombra-sm);
        border-top: 3px solid var(--celeste);
        transition: transform var(--trans), box-shadow var(--trans);
    }
    .info-card:hover { transform: translateY(-4px); box-shadow: var(--sombra-md); }
    .info-card h3 { font-family: var(--font-display); font-size:1.25rem; color:var(--azul); margin-bottom:.9rem; }
    .info-card p, .info-card li { color: var(--texto-suave); line-height: 1.7; }

    /* =============================================
       TARJETAS DE ACTIVIDAD
    ============================================= */
    .activities-section { padding: 4rem 2rem; background: var(--gris-bg); }
    .activities-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
        gap: 1.75rem; max-width: 1200px; margin: 0 auto;
    }
    .activity-card {
        background: var(--blanco); border-radius: var(--radio);
        overflow: hidden; box-shadow: var(--sombra-sm);
        cursor: pointer; display: flex; flex-direction: column;
        border: 1px solid var(--gris-borde);
        transition: transform var(--trans), box-shadow var(--trans);
    }
    .activity-card:hover { transform: translateY(-5px); box-shadow: var(--sombra-lg); }
    .activity-image {
        height: 200px; overflow: hidden;
        background: var(--celeste-lt); position: relative;
    }
    .activity-image img {
        width:100%; height:100%; object-fit:cover;
        transition: transform .5s ease; display:block;
    }
    .activity-card:hover .activity-image img { transform: scale(1.05); }
    .activity-video-badge {
        position:absolute; top:10px; left:10px;
        background:rgba(0,0,0,.65); color:white;
        font-size:.75rem; font-weight:600;
        padding:3px 9px; border-radius:20px;
    }
    .activity-content { padding:1.4rem; flex-grow:1; display:flex; flex-direction:column; }
    .activity-content h3 {
        font-family: var(--font-display);
        font-size:1.15rem; color:var(--azul);
        margin-bottom:.6rem; line-height:1.35;
    }
    .activity-description-preview {
        color:var(--texto-suave); font-size:.9rem;
        line-height:1.6; flex-grow:1; margin-bottom:.8rem;
    }
    .activity-footer {
        display:flex; justify-content:space-between; align-items:center;
        margin-top:auto; padding-top:.8rem;
        border-top:1px solid var(--gris-borde);
    }
    .activity-date { color:var(--celeste); font-size:.8rem; font-weight:600; }
    .activity-read-more { font-size:.82rem; font-weight:600; color:var(--azul); }
    .activity-read-more::after { content:'→'; margin-left:3px; }

    /* =============================================
       MODAL DE ACTIVIDAD
    ============================================= */
    .activity-modal-overlay {
        position:fixed; inset:0;
        background:rgba(0,10,30,.85);
        z-index:2000; display:flex; align-items:stretch;
        animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .activity-modal {
        background:var(--blanco);
        width:100%; max-width:920px;
        margin:auto; height:100vh;
        display:flex; flex-direction:column; overflow:hidden;
        animation: slideUp .3s cubic-bezier(.25,.46,.45,.94);
    }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

    .modal-topbar {
        background:var(--azul);
        border-bottom:2px solid var(--celeste);
        padding:.75rem 1.5rem;
        display:flex; align-items:center; justify-content:space-between;
        flex-shrink:0;
    }
    .modal-topbar-logo {
        color:white; font-family:var(--font-display);
        font-size:1.1rem; font-weight:700;
    }
    .modal-close-btn {
        background:rgba(255,255,255,.12);
        border:1px solid rgba(255,255,255,.25);
        color:white; width:36px; height:36px;
        border-radius:50%; font-size:1.2rem;
        cursor:pointer; display:flex; align-items:center; justify-content:center;
        transition:background var(--trans);
    }
    .modal-close-btn:hover { background:rgba(220,53,69,.7); }

    .modal-body { overflow-y:auto; flex-grow:1; }

    /* Carrusel del modal */
    .modal-media { background:#0a0a0a; position:relative; }
    .modal-carrusel { overflow:hidden; position:relative; touch-action:pan-y; }
    .modal-carrusel-track {
        display:flex;
        transition:transform .4s cubic-bezier(.25,.46,.45,.94);
        will-change:transform;
    }
    .modal-carrusel-slide {
        flex:0 0 100%; display:flex;
        align-items:center; justify-content:center;
        min-height:220px; max-height:50vh; background:#0a0a0a;
    }
    .modal-carrusel-slide img {
        max-width:100%; max-height:50vh;
        object-fit:contain; display:block; pointer-events:none;
    }
    .modal-carrusel-slide .video-embed {
        width:100%; aspect-ratio:16/9; max-height:50vh;
    }
    .modal-carrusel-slide .video-embed iframe {
        width:100%; height:100%; border:none; display:block;
    }
    .modal-carrusel-btn {
        position:absolute; top:50%; transform:translateY(-50%);
        background:rgba(255,255,255,.15); backdrop-filter:blur(4px);
        border:1px solid rgba(255,255,255,.3);
        color:white; width:40px; height:40px;
        border-radius:50%; font-size:1.3rem;
        cursor:pointer; z-index:10;
        display:flex; align-items:center; justify-content:center;
        transition:background var(--trans);
    }
    .modal-carrusel-btn:hover { background:var(--azul); }
    .modal-carrusel-prev { left:10px; }
    .modal-carrusel-next { right:10px; }
    .modal-media-counter {
        position:absolute; top:10px; right:12px;
        background:rgba(0,0,0,.6); color:white;
        font-size:.75rem; font-weight:700;
        padding:3px 10px; border-radius:20px; z-index:10;
        pointer-events:none;
    }
    .modal-thumbs {
        display:flex; gap:6px; padding:8px 12px;
        background:#161616; overflow-x:auto;
        scrollbar-width:thin; scrollbar-color:#444 transparent;
    }
    .modal-thumbs::-webkit-scrollbar { height:3px; }
    .modal-thumb {
        flex-shrink:0; width:58px; height:42px;
        border-radius:5px; overflow:hidden;
        cursor:pointer; border:2px solid transparent;
        opacity:.5; transition:opacity .2s, border-color .2s;
        background:#333; display:flex; align-items:center; justify-content:center;
        position:relative;
    }
    .modal-thumb.active { border-color:var(--celeste); opacity:1; }
    .modal-thumb:hover { opacity:.85; }
    .modal-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .modal-thumb.is-video { color:white; font-size:1.3rem; }

    .modal-content-area { padding:2rem 2.5rem; }
    .modal-title {
        font-family:var(--font-display);
        font-size:clamp(1.4rem,3vw,2rem);
        color:var(--azul); line-height:1.25; margin-bottom:1rem;
    }
    .modal-meta {
        display:flex; flex-wrap:wrap; align-items:center; gap:.8rem;
        margin-bottom:1.5rem; padding-bottom:1.2rem;
        border-bottom:2px solid var(--celeste-lt);
    }
    .modal-date { color:var(--celeste); font-size:.88rem; font-weight:600; }
    .modal-share { display:flex; gap:.6rem; flex-wrap:wrap; margin-left:auto; }
    .share-btn {
        padding:.45rem 1rem; border:none; border-radius:6px;
        font-size:.82rem; font-weight:600; cursor:pointer;
        color:white; display:inline-flex; align-items:center; gap:.35rem;
        transition:opacity var(--trans), transform var(--trans);
        font-family:var(--font-body);
    }
    .share-btn:hover { opacity:.88; transform:translateY(-1px); }
    .share-btn.fb { background:#1877f2; }
    .share-btn.wa { background:#25d366; }
    .share-btn.cp { background:var(--texto-suave); }
    .copy-ok {
        font-size:.78rem; color:var(--verde); font-weight:600;
        display:none; margin-top:.3rem;
    }
    .modal-description {
        color:var(--texto); font-size:1rem; line-height:1.8;
        margin-bottom:2rem;
    }
    .modal-description img {
        max-width:100%; border-radius:8px;
        margin:1rem 0; display:block; box-shadow:var(--sombra-sm);
    }
    .modal-description img.img-chica   { max-width:220px; }
    .modal-description img.img-mediana { max-width:460px; }

    /* =============================================
       GALERÍA
    ============================================= */
    .carrusel-section { padding:4rem 2rem; background:var(--blanco); }
    .carrusel-container {
        max-width:900px; margin:0 auto;
        border-radius:var(--radio); overflow:hidden;
        box-shadow:var(--sombra-lg); position:relative;
    }
    .carrusel-track { display:flex; transition:transform .5s ease; }
    .carrusel-slide { flex:0 0 100%; position:relative; }
    .carrusel-slide img { width:100%; max-height:520px; object-fit:cover; display:block; }
    .carrusel-caption {
        position:absolute; bottom:0; left:0; right:0;
        background:linear-gradient(transparent,rgba(0,30,70,.8));
        color:white; padding:2rem 1.2rem .9rem;
        font-size:.95rem; font-weight:500;
    }
    .carrusel-btn {
        position:absolute; top:50%; transform:translateY(-50%);
        background:rgba(0,51,102,.65); backdrop-filter:blur(4px);
        border:none; color:white;
        width:44px; height:44px; border-radius:50%;
        font-size:1.5rem; cursor:pointer; z-index:5;
        display:flex; align-items:center; justify-content:center;
        transition:background var(--trans);
    }
    .carrusel-btn:hover { background:var(--azul); }
    .carrusel-prev { left:12px; }
    .carrusel-next { right:12px; }
    .carrusel-dots { display:flex; justify-content:center; gap:8px; margin-top:1rem; }
    .carrusel-dot {
        width:10px; height:10px; border-radius:50%;
        background:var(--gris-borde); cursor:pointer;
        transition:background var(--trans), transform var(--trans);
    }
    .carrusel-dot.active { background:var(--azul); transform:scale(1.2); }

    /* =============================================
       CONTACTO
    ============================================= */
    .contact-section { background:var(--gris-bg); padding:4rem 2rem; }
    .contact-item {
        background:var(--blanco); border-radius:var(--radio);
        padding:2rem; text-align:center; box-shadow:var(--sombra-sm);
        border-bottom:3px solid var(--celeste);
        transition:transform var(--trans);
    }
    .contact-item:hover { transform:translateY(-3px); }
    .contact-item h3 { font-family:var(--font-display); color:var(--azul); margin-bottom:.6rem; }
    .contact-item p { color:var(--texto-suave); line-height:1.7; }
    .contact-icon { font-size:2.2rem; margin-bottom:.8rem; }

    /* =============================================
       FOOTER
    ============================================= */
    .footer {
        background:var(--azul); color:rgba(255,255,255,.8);
        text-align:center; padding:2.5rem 2rem;
        border-top:3px solid var(--celeste);
    }
    .footer p { margin:.4rem 0; font-size:.9rem; }
    .social-links { margin-top:.8rem; }
    .social-links a {
        color:var(--celeste); text-decoration:none;
        margin:0 .8rem; font-size:.9rem; font-weight:500;
        transition:color var(--trans);
    }
    .social-links a:hover { color:white; }

    /* =============================================
       ADMIN
    ============================================= */
    .admin-panel { max-width:1200px; margin:0 auto; padding:1.5rem; }
    .admin-header {
        background:var(--azul); color:white;
        padding:1.2rem 1.8rem; border-radius:var(--radio);
        display:flex; justify-content:space-between; align-items:center;
        margin-bottom:1.2rem; box-shadow:var(--sombra-md);
    }
    .admin-header h1 { font-family:var(--font-display); font-size:1.3rem; }
    .admin-header-btns { display:flex; gap:.6rem; }

    .btn-admin {
        padding:.5rem 1.1rem; border:none; border-radius:6px;
        font-size:.88rem; font-weight:600; cursor:pointer;
        font-family:var(--font-body);
        transition:opacity var(--trans), transform var(--trans);
    }
    .btn-admin:hover { opacity:.88; transform:translateY(-1px); }
    .btn-admin.verde { background:var(--verde); color:white; }
    .btn-admin.gris  { background:rgba(255,255,255,.18); color:white; border:1px solid rgba(255,255,255,.3); }
    .btn-admin.azul  { background:var(--celeste); color:var(--azul); }
    .btn-admin.rojo  { background:var(--rojo); color:white; }
    .btn-admin.warn  { background:#ffc107; color:#000; }
    .btn-admin.gris2 { background:#6c757d; color:white; }

    .admin-tabs {
        display:flex; gap:.5rem; margin-bottom:1.2rem;
        background:var(--blanco); padding:.5rem;
        border-radius:var(--radio); box-shadow:var(--sombra-sm);
    }
    .admin-tab {
        flex:1; padding:.7rem 1rem; border:none;
        border-radius:7px; cursor:pointer; font-size:.92rem;
        font-weight:500; font-family:var(--font-body);
        color:var(--texto-suave); background:transparent;
        transition:all var(--trans);
    }
    .admin-tab.active { background:var(--azul); color:white; font-weight:600; }
    .admin-tab:hover:not(.active) { background:var(--celeste-lt); }

    .admin-content { display:grid; grid-template-columns:340px 1fr; gap:1.2rem; }
    .admin-card {
        background:var(--blanco); border-radius:var(--radio);
        padding:1.5rem; box-shadow:var(--sombra-sm);
    }
    .admin-card h2 {
        font-family:var(--font-display); font-size:1.1rem; color:var(--azul);
        margin-bottom:1.1rem; padding-bottom:.6rem;
        border-bottom:2px solid var(--celeste-lt);
        display:flex; justify-content:space-between; align-items:center;
    }
    .activity-count {
        background:var(--celeste); color:white;
        font-size:.75rem; font-weight:700;
        padding:.2rem .6rem; border-radius:20px;
        font-family:var(--font-body);
    }

    .form-group { margin-bottom:1rem; }
    .form-group label {
        display:block; font-size:.8rem; font-weight:700;
        color:var(--texto-suave); margin-bottom:.35rem;
        text-transform:uppercase; letter-spacing:.04em;
    }
    .form-group input, .form-group textarea {
        width:100%; padding:.65rem .9rem;
        border:1.5px solid var(--gris-borde); border-radius:7px;
        font-size:.9rem; font-family:var(--font-body); color:var(--texto);
        transition:border-color var(--trans), box-shadow var(--trans);
        background:var(--blanco); box-sizing:border-box;
    }
    .form-group input:focus, .form-group textarea:focus {
        outline:none; border-color:var(--celeste);
        box-shadow:0 0 0 3px rgba(117,170,219,.2);
    }
    .hint { font-size:.76rem; color:var(--texto-suave); margin-top:.3rem; line-height:1.4; }

    /* Media section en admin */
    .media-section {
        border:1.5px dashed var(--gris-borde); border-radius:8px;
        padding:1rem; margin-bottom:1rem; background:var(--gris-bg);
    }
    .media-section h3 {
        font-size:.82rem; font-weight:700; color:var(--azul);
        text-transform:uppercase; letter-spacing:.05em; margin-bottom:.8rem;
    }
    .media-preview-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:.7rem; }
    .media-preview-item {
        position:relative; width:76px; height:58px;
        border-radius:6px; overflow:hidden;
        border:2px solid var(--gris-borde); background:#eee;
        display:flex; align-items:center; justify-content:center;
    }
    .media-preview-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .media-preview-item.is-video { background:#1a1a1a; color:white; font-size:1.4rem; }
    .media-remove-btn {
        position:absolute; top:-5px; right:-5px;
        background:var(--rojo); color:white;
        border:2px solid white; border-radius:50%;
        width:20px; height:20px; font-size:.7rem;
        cursor:pointer; display:flex; align-items:center; justify-content:center;
        z-index:5;
    }
    .media-add-btn {
        padding:.45rem .9rem; border:1.5px dashed var(--celeste);
        border-radius:6px; background:var(--celeste-lt);
        color:var(--azul); font-size:.82rem; font-weight:600;
        cursor:pointer; font-family:var(--font-body);
        transition:background var(--trans);
    }
    .media-add-btn:hover { background:#c2daf0; }

    /* Rich editor */
    .rich-editor-wrapper {
        border:1.5px solid var(--gris-borde); border-radius:7px; overflow:hidden;
        transition:border-color var(--trans);
    }
    .rich-editor-wrapper:focus-within { border-color:var(--celeste); box-shadow:0 0 0 3px rgba(117,170,219,.2); }
    .rich-toolbar {
        display:flex; flex-wrap:wrap; gap:3px;
        padding:6px 8px; background:#f8f9fb;
        border-bottom:1px solid var(--gris-borde);
    }
    .toolbar-btn {
        padding:3px 8px; border:1px solid #ddd; border-radius:4px;

const DEMO_FOTOS = [

    {id:"df-8", url:"https://picsum.photos/seed/pjq-f8/1200/600", titulo:"Sede de la Unidad Básica", orden:7}

let mainSlide  = 0;
let modalSlide = {};
let mediaList  = [];   // [{type:'img'|'video', url, embedUrl?, thumb?}]
let touchStartX = 0;

const $app = document.getElementById("app");

// =============================================
// UTILIDADES
// =============================================
const setMeta = (attr, val, content) => {
    let el = document.querySelector(`meta[${attr}="${val}"]`);
    if (!el) { el = document.createElement("meta"); el.setAttribute(attr,val); document.head.appendChild(el); }
    el.setAttribute("content", content);
};
const updateMeta = (act) => {
    if (act) {
        const plain = act.description.replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
        const prev  = plain.substring(0,155)+(plain.length>155?"…":"");
        const img   = act.media&&act.media.length>0&&act.media[0].type==="img"
                      ? act.media[0].url : (act.image||"");
        document.title = `${act.title} | Partido Justicialista`;
        setMeta("name","description",prev);
        setMeta("property","og:title",`${act.title} | Partido Justicialista`);
        setMeta("property","og:description",prev);
        setMeta("property","og:url",window.location.href);
        setMeta("property","og:image",img);
    } else {
        const def = "La UB de Quequén del Partido Justicialista de Necochea, comprometida con el bienestar de nuestra comunidad.";
        document.title = "Partido Justicialista de Necochea, Unidad Básica Quequén";
        setMeta("name","description",def);
        setMeta("property","og:title","Partido Justicialista de Necochea, Unidad Básica Quequén");
        setMeta("property","og:description",def);
        setMeta("property","og:url",window.location.href.split("#")[0]);
        setMeta("property","og:image","");
    }
};

const isYTUrl    = u => /youtube\.com|youtu\.be/.test(u);
const toYTEmbed  = u => { const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?`https://www.youtube.com/embed/${m[1]}?rel=0`:null; };
const toYTThumb  = u => { const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?`https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`:null; };
const stripHtml  = h => h.replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
const esc        = s => (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");
const getDate    = () => new Date().toLocaleDateString("es-ES",{year:"numeric",month:"long",day:"numeric"});

const normalizeAct = (d, id) => {
    let media = d.media || [];
    if (!media.length) {
        const imgs = d.images||(d.image?[d.image]:[]);
        media = imgs.map(u=>({type:"img",url:u}));
    }
    return { id, ...d, media };
};

// =============================================
// FIREBASE CRUD
// =============================================
const loadActivities = async () => {
    try {
        const snap = await activitiesCol.orderBy("timestamp","desc").limit(MAX_ACT).get();
        activities = snap.docs.map(doc=>normalizeAct(doc.data(),doc.id));
        if (!activities.length) activities = DEMO_ACTIVITIES;
    } catch(e) { console.error(e); activities = DEMO_ACTIVITIES; }
    render();
};
const loadFotos = async () => {
    try {
        const snap = await fotosCol.orderBy("orden","asc").get();
        fotosCarrusel = snap.docs.map(doc=>({id:doc.id,...doc.data()}));
        if (!fotosCarrusel.length) fotosCarrusel = DEMO_FOTOS;
    } catch(e) { console.error(e); fotosCarrusel = DEMO_FOTOS; }
    render();
};
const saveActivity = async (data) => {
    try {
        if (editingActivity) await activitiesCol.doc(editingActivity.id).update(data);
        else                 await activitiesCol.add(data);
        await loadActivities();
    } catch(e) { console.error(e); alert("Error al guardar. Revisá la consola."); }
};
const deleteActFB  = async (id) => { try{ await activitiesCol.doc(id).delete(); await loadActivities(); }catch(e){console.error(e);} };
const saveFoto     = async (d)     => { try{ await fotosCol.add(d);            await loadFotos(); }catch(e){console.error(e);} };
const updateFoto   = async (id,d)  => { try{ await fotosCol.doc(id).update(d); await loadFotos(); }catch(e){console.error(e);} };
const deleteFotoFB = async (id)    => { try{ await fotosCol.doc(id).delete();  await loadFotos(); }catch(e){console.error(e);} };

// =============================================
// NAVEGACIÓN
// =============================================
const navigateTo = (page) => { currentPage=page; render(); };
window.toggleMenu = () => { const m=document.getElementById("mobile-menu"); if(m) m.classList.toggle("show"); };
window.closeMenu  = () => { const m=document.getElementById("mobile-menu"); if(m) m.classList.remove("show"); };
window.toggleMasActividades = () => {
    const el=document.getElementById("mas-actividades");
    const btn=document.getElementById("btn-ver-mas");
    if(!el||!btn) return;
    const open=el.style.display==="block";
    el.style.display=open?"none":"block";
    const rest=activities.slice(MAX_FEATURED);
    btn.textContent=open?`Ver más actividades (${rest.length})`:"Ocultar";
};

const getActFromHash = () => {
    const h = window.location.hash;
    if (h&&h.startsWith("#actividad-")) {
        const id=h.replace("#actividad-","");
        const a=activities.find(x=>x.id===id);
        updateMeta(a||null); return a;
    }
    updateMeta(null); return null;
};

// =============================================
// CARRUSEL GALERÍA
// =============================================
let carTouchX = 0;
window.carTouchStart = (e) => { carTouchX = e.touches[0].clientX; };
window.carTouchEnd   = (e) => { const dx=e.changedTouches[0].clientX-carTouchX; if(Math.abs(dx)>40) dx<0?window.nextSlide():window.prevSlide(); };
let autoSlideTimer = null;
const startAutoSlide = () => {
    stopAutoSlide();
    if(fotosCarrusel.length>1)
        autoSlideTimer = setInterval(()=>{ mainSlide=(mainSlide+1)%fotosCarrusel.length; updateMainCar(); }, 4500);
};
const stopAutoSlide = () => { if(autoSlideTimer){ clearInterval(autoSlideTimer); autoSlideTimer=null; } };
window.nextSlide = ()  => { if(fotosCarrusel.length){mainSlide=(mainSlide+1)%fotosCarrusel.length; updateMainCar(); startAutoSlide();} };
window.prevSlide = ()  => { if(fotosCarrusel.length){mainSlide=(mainSlide-1+fotosCarrusel.length)%fotosCarrusel.length; updateMainCar(); startAutoSlide();} };
window.goToSlide = (i) => { mainSlide=i; updateMainCar(); startAutoSlide(); };
const updateMainCar = () => {
    const t=document.getElementById("carrusel-track");
    if(t) t.style.transform=`translateX(-${mainSlide*100}%)`;
    document.querySelectorAll(".carrusel-dot").forEach((d,i)=>d.classList.toggle("active",i===mainSlide));
};

// =============================================
// CARRUSEL MODAL
// =============================================
window.nextModalSlide = (aid) => {
    const act=activities.find(a=>a.id===aid);
    if(!act||!act.media||act.media.length<=1) return;
    modalSlide[aid]=((modalSlide[aid]||0)+1)%act.media.length;
    updateModalCar(aid);
};
window.prevModalSlide = (aid) => {
    const act=activities.find(a=>a.id===aid);
    if(!act||!act.media||act.media.length<=1) return;
    modalSlide[aid]=((modalSlide[aid]||0)-1+act.media.length)%act.media.length;
    updateModalCar(aid);
};
window.goToModalSlide = (aid,i) => { modalSlide[aid]=i; updateModalCar(aid); };
const updateModalCar = (aid) => {
    const cur=modalSlide[aid]||0;
    const t=document.getElementById(`mtrack-${aid}`);
    if(t) t.style.transform=`translateX(-${cur*100}%)`;
    document.querySelectorAll(`.mthumb-${aid}`).forEach((x,i)=>x.classList.toggle("active",i===cur));
    const ctr=document.getElementById(`mcounter-${aid}`);
    const act=activities.find(a=>a.id===aid);
    if(ctr&&act) ctr.textContent=`${cur+1} / ${act.media.length}`;
};
window.modalTouchStart = (e,aid) => { touchStartX=e.touches[0].clientX; };
window.modalTouchEnd   = (e,aid) => {
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>40) dx<0?window.nextModalSlide(aid):window.prevModalSlide(aid);
};

// =============================================
// ABRIR / CERRAR MODAL
// =============================================
window.openActivity  = (id) => { window.location.hash=`actividad-${id}`; render(); };
window.closeActivity = ()   => { window.location.hash=""; updateMeta(null); render(); };
// Genera la URL "bonita" para compartir: /actividad/ID
// Esta URL pasa por la Netlify Function que pone las meta tags correctas
const getShareUrl = (actId) => {
    const base = window.location.origin;
    return `${base}/actividad/${actId}`;
};

window.shareWA  = (title, url) => window.open(`https://wa.me/?text=${encodeURIComponent(`*${title}*\n${url}`)}`, "_blank");
window.shareFB  = (url)        => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, "_blank","width=600,height=400");
window.copyLink = (actId) => {
    const shareUrl = actId ? getShareUrl(actId) : window.location.href;
    navigator.clipboard.writeText(shareUrl).then(()=>{
        const el=document.getElementById("copy-ok");
        if(el){ el.style.display="block"; setTimeout(()=>el.style.display="none",2500); }
    }).catch(()=>prompt("Copiá este link:", shareUrl));
};

// =============================================
// ADMIN — EDITOR ENRIQUECIDO
// =============================================
window.richFormat    = (cmd,val) => { document.execCommand(cmd,false,val||null); document.getElementById("richEditor").focus(); };
window.richInsertImg = (size) => {
    const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
    inp.onchange=e=>{
        const f=e.target.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=ev=>{
            const ed=document.getElementById("richEditor"); if(!ed) return;
            ed.focus();
            const img=document.createElement("img");
            img.src=ev.target.result; img.className=`img-${size}`; img.alt="imagen";
            const sel=window.getSelection();
            if(sel&&sel.rangeCount>0&&ed.contains(sel.anchorNode)){
                const rng=sel.getRangeAt(0); rng.deleteContents(); rng.insertNode(img);
                rng.setStartAfter(img); rng.collapse(true);
                sel.removeAllRanges(); sel.addRange(rng);
            } else ed.appendChild(img);
        };
        r.readAsDataURL(f);
    };
    inp.click();
};
const getEditor = () => { const e=document.getElementById("richEditor"); return e?e.innerHTML:""; };

window.addMediaUrl = () => {
    const url=prompt("Pegá la URL de la imagen o video de YouTube:\n\nPara fotos: usá imgbb.com (gratis)\nPara video: youtube.com/watch?v=...");
    if (!url||!url.trim()) return;
    const u=url.trim();
    if (isYTUrl(u)) {
        const embedUrl=toYTEmbed(u);
        if (!embedUrl){ alert("URL de YouTube no válida."); return; }
        mediaList.push({ type:"video", url:u, embedUrl, thumb:toYTThumb(u) });
    } else {
        mediaList.push({ type:"img", url:u });
    }
    refreshMediaPreview();
};
window.removeMedia = (i) => { mediaList.splice(i,1); refreshMediaPreview(); };
const refreshMediaPreview = () => {
    const c=document.getElementById("mediaPreview"); if(!c) return;
    c.innerHTML=mediaList.map((m,i)=>{
        if(m.type==="video") return `
            <div class="media-preview-item is-video" style="position:relative;">
                ${m.thumb?`<img src="${m.thumb}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:.5;">`:""}
                <span style="position:relative;z-index:1;">▶</span>
                <button class="media-remove-btn" onclick="removeMedia(${i})">✕</button>
            </div>`;
        return `
            <div class="media-preview-item">
                <img src="${m.url}" alt="media">
                <button class="media-remove-btn" onclick="removeMedia(${i})">✕</button>
            </div>`;
    }).join("");
};

window.subirFotoGaleria = () => {
    if(fotosCarrusel.length>=MAX_FOTO){ alert("Máximo 15 fotos."); return; }
    const url=prompt("URL de la imagen (subila a imgbb.com y pegá la URL directa):");
    if(!url||!url.trim()) return;
    const titulo=prompt("Título para esta foto:","Nueva foto");
    if(!titulo) return;
    saveFoto({ url:url.trim(), titulo, orden:fotosCarrusel.length });
};
window.subirFotoDesdeArchivo = () => {
    if(fotosCarrusel.length>=MAX_FOTO){ alert("Máximo 15 fotos."); return; }
    const inp=document.createElement("input");
    inp.type="file"; inp.accept="image/*";
    inp.onchange=e=>{
        const f=e.target.files[0]; if(!f) return;
        if(f.size>600000){ alert("La imagen es muy grande (máx. 600 KB). Comprimí la foto en https://squoosh.app y volvé a intentarlo."); return; }
        const r=new FileReader();
        r.onload=ev=>{
            const titulo=prompt("Título para esta foto:",f.name.replace(/\.[^.]+$/,"").replace(/[-_]/g," "));
            if(titulo===null) return;
            saveFoto({ url:ev.target.result, titulo:titulo||"Sin título", orden:fotosCarrusel.length });
        };
        r.readAsDataURL(f);
    };
    inp.click();
};
window.actualizarFoto  = async (id,titulo) => { if(titulo) await updateFoto(id,{titulo}); };
window.eliminarFoto    = async (id)        => { if(confirm("¿Eliminar esta foto?")) await deleteFotoFB(id); };
window.moverFoto = async (id,dir) => {
    const i=fotosCarrusel.findIndex(f=>f.id===id); if(i===-1) return;
    const ni=dir==="arriba"?i-1:i+1;
    if(ni<0||ni>=fotosCarrusel.length) return;
    await updateFoto(fotosCarrusel[i].id,{orden:ni});
    await updateFoto(fotosCarrusel[ni].id,{orden:i});
};

window.handleActivitySubmit = async (e) => {
    e.preventDefault();
    const title=document.getElementById("actTitle").value.trim();
    const desc =getEditor();
    if(!title){ alert("El título es obligatorio."); return; }
    if(!mediaList.length){ alert("Agregá al menos una imagen o video."); return; }
    const firstImg=mediaList.find(m=>m.type==="img");
    await saveActivity({
        title, description:desc,
        image: firstImg?firstImg.url:(mediaList[0].thumb||""),
        media: mediaList,
        images: mediaList.filter(m=>m.type==="img").map(m=>m.url),
        date:  editingActivity?(editingActivity.date||getDate()):getDate(),
        timestamp: editingActivity?editingActivity.timestamp:Date.now(),
    });
    editingActivity=null; mediaList=[]; render();
};

window.editActivityAdmin = (id) => {
    editingActivity=activities.find(a=>a.id===id);
    mediaList=editingActivity&&editingActivity.media?[...editingActivity.media]:[];
    adminTab="actividades"; render();
    setTimeout(()=>{ if(editingActivity) setEditor(editingActivity.description); },60);
};
window.deleteActivityAdmin = async (id) => {
    if(confirm("¿Eliminar esta actividad?")){
        await deleteActFB(id);
        if(editingActivity&&editingActivity.id===id){ editingActivity=null; mediaList=[]; }
    }
};
window.cancelEdit  = () => { editingActivity=null; mediaList=[]; render(); };
window.setAdminTab = (t) => { adminTab=t; render(); };

const OrgInfo = () => `
    <section id="info" style="padding:4rem 2rem;background:var(--blanco);">
        <div class="container">
            <h2 class="section-title">Nuestra Organización</h2>
            <div class="section-divider"></div>
            <div class="info-grid">
                <div class="info-card"><h3>Sobre Nosotros</h3><p>La UB de Quequén del Partido Justicialista de Necochea es una organización política comprometida con el bienestar de nuestra comunidad. Trabajamos incansablemente por la justicia social y el desarrollo integral de todos los quequenenses.</p></div>
                <div class="info-card"><h3>Misión</h3><p>Promover políticas públicas que garanticen el acceso a derechos fundamentales, fomentar la participación ciudadana y construir una sociedad más justa e inclusiva en Quequén y el partido de Necochea.</p></div>
                <div class="info-card"><h3>Valores</h3><ul class="values-list"><li>Justicia Social</li><li>Solidaridad</li><li>Participación Democrática</li><li>Compromiso Comunitario</li><li>Transparencia</li><li>Inclusión</li></ul></div>
            </div>
        </div>
    </section>`;

const ActivityCard = (act) => {
    const fm=act.media&&act.media.length>0?act.media[0]:null;
    const imgSrc=fm?(fm.type==="video"?(fm.thumb||""):fm.url):(act.image||"");
    const hasVid=act.media&&act.media.some(m=>m.type==="video");
    const plain=stripHtml(act.description);
    const prev=plain.length>180?plain.substring(0,180)+"…":plain;
    return `
    <div class="activity-card" onclick="openActivity('${esc(act.id)}')">
        <div class="activity-image">
            ${imgSrc?`<img src="${imgSrc}" alt="${esc(act.title)}" loading="lazy">`:'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--celeste);font-size:2rem;">🏛️</div>'}
            ${hasVid?'<span class="activity-video-badge">▶ Video</span>':""}
        </div>
        <div class="activity-content">
            <h3>${act.title}</h3>
            <p class="activity-description-preview">${prev}</p>
            <div class="activity-footer">
                <span class="activity-date">${act.date||getDate()}</span>
                <span class="activity-read-more">Leer más</span>
            </div>
        </div>
    </div>`;
};

const ActivitiesSection = () => {
    const featured = activities.slice(0, MAX_FEATURED);
    const rest = activities.slice(MAX_FEATURED);
    return `
    <section id="actividades" class="activities-section">
        <div class="container">
            <h2 class="section-title">Actividades Destacadas</h2>
            <div class="section-divider"></div>
            ${activities.length===0
                ? '<p style="text-align:center;color:var(--texto-suave);padding:3rem;">Cargando actividades...</p>'
                : `<div class="activities-grid">
                    ${featured.map(act=>ActivityCard(act)).join("")}
                   </div>
                   ${rest.length>0?`
                   <div style="margin-top:2rem;">
                       <button id="btn-ver-mas" onclick="toggleMasActividades()" style="display:block;margin:0 auto;padding:.8rem 2.2rem;background:var(--azul);color:white;border:none;border-radius:50px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:transform .2s,box-shadow .2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(0,51,102,.3)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
                           Ver más actividades (${rest.length})
                       </button>
                       <div id="mas-actividades" style="display:none;margin-top:1.75rem;">
                           <div class="activities-grid">
                               ${rest.map(act=>ActivityCard(act)).join("")}
                           </div>
                       </div>
                   </div>`:""}
                `}
        </div>
    </section>`;
};

const GaleriaSection = () => `
    <section id="carrusel" class="carrusel-section">

// =============================================
// MODAL DE ACTIVIDAD
// =============================================
const ActivityModal = (act) => {
    if(!act) return "";
    const url   = window.location.href;
    const media = act.media||[];
    const multi = media.length>1;
    const aid   = act.id;
    if(modalSlide[aid]===undefined) modalSlide[aid]=0;
    const cur=modalSlide[aid];

    const slideH = (m,i) => m.type==="video"
        ? `<div class="modal-carrusel-slide"><div class="video-embed"><iframe src="${m.embedUrl}" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div></div>`
        : `<div class="modal-carrusel-slide"><img src="${m.url}" alt="${esc(act.title)}" loading="lazy"></div>`;

    const thumbH = (m,i) => m.type==="video"
        ? `<div class="modal-thumb is-video ${i===cur?"active":""} mthumb-${aid}" onclick="event.stopPropagation();goToModalSlide('${aid}',${i})" style="position:relative;overflow:hidden;">
               ${m.thumb?`<img src="${m.thumb}" style="width:100%;height:100%;object-fit:cover;opacity:.5;position:absolute;inset:0;">`:""}
               <span style="position:relative;z-index:1;">▶</span>
           </div>`
        : `<div class="modal-thumb ${i===cur?"active":""} mthumb-${aid}" onclick="event.stopPropagation();goToModalSlide('${aid}',${i})"><img src="${m.url}" alt="miniatura"></div>`;

    return `
    <div class="activity-modal-overlay" onclick="if(event.target===this)closeActivity()">
      <div class="activity-modal">

        <div class="modal-topbar">
            <span class="modal-topbar-logo">Partido Justicialista</span>
            <button class="modal-close-btn" onclick="closeActivity()" title="Cerrar">✕</button>
        </div>

        <div class="modal-body">
            ${media.length>0?`
            <div class="modal-media">
                ${multi?`<span class="modal-media-counter" id="mcounter-${aid}">${cur+1} / ${media.length}</span>`:""}
                ${multi?`
                    <button class="modal-carrusel-btn modal-carrusel-prev" onclick="event.stopPropagation();prevModalSlide('${aid}')">‹</button>
                    <button class="modal-carrusel-btn modal-carrusel-next" onclick="event.stopPropagation();nextModalSlide('${aid}')">›</button>`:""}
                <div class="modal-carrusel" ontouchstart="modalTouchStart(event,'${aid}')" ontouchend="modalTouchEnd(event,'${aid}')">
                    <div class="modal-carrusel-track" id="mtrack-${aid}" style="transform:translateX(-${cur*100}%)">
                        ${media.map(slideH).join("")}
                    </div>
                </div>
                ${multi?`<div class="modal-thumbs">${media.map(thumbH).join("")}</div>`:""}
            </div>`:""}

            <div class="modal-content-area">
                <h1 class="modal-title">${act.title}</h1>
                <div class="modal-meta">
                    <span class="modal-date">📅 ${act.date||getDate()}</span>
                    <div class="modal-share">
                        <button class="share-btn fb" onclick="shareFB(getShareUrl('${esc(act.id)}'))">📘 Facebook</button>
                        <button class="share-btn wa" onclick="shareWA('${esc(act.title)}',getShareUrl('${esc(act.id)}'))">📱 WhatsApp</button>
                        <button class="share-btn cp" onclick="copyLink('${esc(act.id)}')">🔗 Copiar link</button>
                    </div>
                </div>
                <div class="copy-ok" id="copy-ok">✓ Link copiado al portapapeles</div>
                <div class="modal-description">${act.description}</div>
            </div>
        </div>

      </div>
    </div>`;
};

            ${ContactSection()}${Footer()}

};

});
